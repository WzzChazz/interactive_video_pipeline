<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎬 Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface2:#1c1c2e;--border:#2a2a3f;--accent:#7c3aed;--accent2:#4f46e5;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--text:#e2e8f0;--muted:#64748b}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge-voting{background:#1e3a5f;color:#60a5fa}
.badge-pending_review{background:#4a2e0a;color:#f59e0b;animation:pulse 2s infinite}
.badge-generating{background:#2d1b69;color:#a78bfa}
.badge-generating_assets{background:#2d1b69;color:#a78bfa;animation:pulse 2s infinite}
.badge-completed{background:#064e3b;color:#34d399}
.badge-published{background:#1a3a1a;color:#4ade80}
.badge-failed{background:#450a0a;color:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.layout{display:grid;grid-template-columns:1fr 380px;gap:0;height:calc(100vh - 57px)}
.main{overflow-y:auto;padding:20px}
.sidebar{border-left:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;line-height:1}
.stat-card .label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:#450a0a;color:#f87171;border:1px solid #7f1d1d}
.btn-danger:hover{background:#7f1d1d}
.btn-sm{padding:5px 10px;font-size:12px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;transition:.2s}
.filter-btn.active,.filter-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.ep-list{display:flex;flex-direction:column;gap:10px}
.ep-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.ep-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.ep-card.selected{border-color:var(--accent);background:var(--surface2)}
.ep-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.ep-card.status-voting::before{background:var(--blue)}
.ep-card.status-pending_review::before{background:var(--yellow);animation:pulse 1.5s infinite}
.ep-card.status-generating::before{background:var(--accent)}
.ep-card.status-generating_assets::before{background:var(--accent);animation:pulse 1.5s infinite}
.ep-card.status-completed::before{background:var(--green)}
.ep-card.status-published::before{background:#4ade80}
.ep-card.status-failed::before{background:var(--red)}
.ep-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ep-tag{font-size:11px;font-weight:600;color:var(--muted);font-family:monospace}
.ep-title{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-meta{display:flex;gap:12px;font-size:11px;color:var(--muted)}
.vote-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:8px;background:var(--surface2)}
.vote-a{background:var(--blue);transition:width .5s}
.vote-b{background:var(--accent);transition:width .5s}
.detail-panel{padding:20px;overflow-y:auto;flex:1}
.detail-header{margin-bottom:16px}
.detail-title{font-size:16px;font-weight:700;margin-bottom:4px}
.detail-tag{font-size:11px;color:var(--muted);font-family:monospace}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.section{margin-bottom:16px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.scene-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.scene-num{font-size:10px;font-weight:700;color:var(--accent);font-family:monospace}
.scene-dialogue{font-size:13px;margin:4px 0 8px;line-height:1.5}
.scene-prompt{font-size:11px;color:var(--muted);line-height:1.4;font-family:monospace;background:var(--bg);padding:6px 8px;border-radius:6px}
.error-box{background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:12px;font-size:12px;color:#f87171;line-height:1.5}
.log-panel{border-top:1px solid var(--border);flex-shrink:0}
.log-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.log-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.log-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.log-box{height:220px;overflow-y:auto;padding:10px 14px;font-family:monospace;font-size:11px;line-height:1.6}
.log-line{color:#94a3b8;border-bottom:none}
.log-line.info{color:#60a5fa}
.log-line.success{color:#34d399}
.log-line.error{color:#f87171}
.log-line.warning{color:#fbbf24}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{background:var(--surface2);border-radius:8px;padding:10px}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.info-value{font-size:13px;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipeline-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.running-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.running-dot.active{background:#f59e0b;animation:pulse 1s infinite}
.empty{text-align:center;padding:40px;color:var(--muted)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:420px;max-width:95vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;margin-bottom:12px}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
select.modal-input{cursor:pointer}
.nav-tabs{display:flex;gap:4px;padding:12px 16px 0;border-bottom:1px solid var(--border)}
.nav-tab{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);background:transparent;font-family:inherit}
.nav-tab.active{background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface);color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}
.branch-teaser{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.branch-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.branch-a .branch-label{color:var(--blue)}
.branch-b .branch-label{color:var(--accent)}
.branch-text{font-size:12px;color:var(--text);line-height:1.4}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎬 Pipeline Dashboard</div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="pipeline-indicator">
      <div class="running-dot" id="pipelineDot"></div>
      <span id="pipelineStatus">Idle</span>
    </div>
    <button class="btn btn-primary" onclick="openRunModal()">▶ 立即运行</button>
  </div>
</div>

<div class="layout">
  <div class="main">
    <div class="stats" id="statsGrid">
      <div class="stat-card"><div class="num" id="st-total">—</div><div class="label">总集数</div></div>
      <div class="stat-card"><div class="num" id="st-voting" style="color:var(--blue)">—</div><div class="label">投票中</div></div>
      <div class="stat-card"><div class="num" id="st-pending" style="color:var(--yellow)">—</div><div class="label">待审核</div></div>
      <div class="stat-card"><div class="num" id="st-generating" style="color:var(--accent)">—</div><div class="label">生成中</div></div>
      <div class="stat-card"><div class="num" id="st-published" style="color:var(--green)">—</div><div class="label">已发布</div></div>
      <div class="stat-card"><div class="num" id="st-failed" style="color:var(--red)">—</div><div class="label">失败</div></div>
    </div>

    <div class="toolbar">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter(this,'')">全部</button>
        <button class="filter-btn" onclick="setFilter(this,'VOTING')">投票中</button>
        <button class="filter-btn" onclick="setFilter(this,'PENDING_REVIEW')">待审核</button>
        <button class="filter-btn" onclick="setFilter(this,'GENERATING')">生成中</button>
        <button class="filter-btn" onclick="setFilter(this,'COMPLETED')">待发布</button>
        <button class="filter-btn" onclick="setFilter(this,'PUBLISHED')">已发布</button>
        <button class="filter-btn" onclick="setFilter(this,'FAILED')">失败</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadEpisodes()">🔄 刷新</button>
    </div>

    <div class="ep-list" id="epList">
      <div class="empty">加载中…</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchSideTab(this,'detail')">详情</button>
      <button class="nav-tab" onclick="switchSideTab(this,'logs')">实时日志</button>
    </div>

    <div id="tab-detail" class="tab-content active" style="flex:1;overflow-y:auto">
      <div class="detail-panel" id="detailPanel">
        <div class="empty" style="margin-top:60px">← 点击左侧集卡片查看详情</div>
      </div>
    </div>

    <div id="tab-logs" class="tab-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div style="flex:1;overflow-y:auto;padding:12px 14px;font-family:monospace;font-size:11px;line-height:1.6" id="logBox"></div>
    </div>
  </div>
</div>

<!-- Run Modal -->
<div class="modal-overlay" id="runModal">
  <div class="modal">
    <h3>▶ 立即触发流水线</h3>
    <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">强制分支（可选，留空则使用投票结果）</label>
    <select class="modal-input" id="branchSelect">
      <option value="">自动（根据投票）</option>
      <option value="A">强制 A 分支</option>
      <option value="B">强制 B 分支</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeRunModal()">取消</button>
      <button class="btn btn-primary" onclick="triggerPipeline()">确认运行</button>
    </div>
  </div>
</div>

<script>
const API = '';
let currentFilter = '';
let selectedId = null;
let ws = null;

// ── Init ──────────────────────────────────────────────────
window.onload = () => {
  loadStats();
  loadEpisodes();
  connectLogs();
  setInterval(()=>{ loadStats(); pollPipeline(); }, 5000);
};

// ── Stats ──────────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/api/stats').then(r=>r.json()).catch(()=>null);
  if (!r) return;
  document.getElementById('st-total').textContent = r.total;
  document.getElementById('st-voting').textContent = r.voting;
  document.getElementById('st-pending').textContent = r.pending_review;
  document.getElementById('st-generating').textContent = r.generating;
  document.getElementById('st-published').textContent = r.published;
  document.getElementById('st-failed').textContent = r.failed;
}

// ── Pipeline status ────────────────────────────────────────
async function pollPipeline() {
  const r = await fetch('/api/pipeline/status').then(r=>r.json()).catch(()=>null);
  if (!r) return;
  const dot = document.getElementById('pipelineDot');
  const txt = document.getElementById('pipelineStatus');
  if (r.running) {
    dot.classList.add('active');
    txt.textContent = '运行中…';
  } else {
    dot.classList.remove('active');
    txt.textContent = 'Idle';
  }
}

// ── Episodes ───────────────────────────────────────────────
async function loadEpisodes() {
  const url = currentFilter ? `/api/episodes?status=${currentFilter}` : '/api/episodes';
  const r = await fetch(url).then(r=>r.json()).catch(()=>null);
  if (!r) return;
  const el = document.getElementById('epList');
  if (!r.items.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  el.innerHTML = r.items.map(ep => {
    const total = ep.vote_a_count + ep.vote_b_count || 1;
    const pctA = Math.round(ep.vote_a_count / total * 100);
    return `
    <div class="ep-card status-${ep.status.toLowerCase()} ${selectedId===ep.id?'selected':''}" onclick="selectEp(${ep.id})">
      <div class="ep-header">
        <span class="ep-tag">${ep.episode_tag}</span>
        <span class="ep-title">${ep.title || '（未命名）'}</span>
        <span class="badge badge-${ep.status.toLowerCase()}">${statusLabel(ep.status)}</span>
      </div>
      <div class="ep-meta">
        <span>🗳 A:${ep.vote_a_count} B:${ep.vote_b_count}</span>
        ${ep.chosen_branch ? `<span>分支:${ep.chosen_branch}</span>` : ''}
        ${ep.error_stage ? `<span style="color:var(--red)">⚠ ${ep.error_stage}</span>` : ''}
        <span style="margin-left:auto">${timeAgo(ep.updated_at)}</span>
      </div>
      <div class="vote-bar">
        <div class="vote-a" style="width:${pctA}%"></div>
        <div class="vote-b" style="width:${100-pctA}%"></div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(btn, val) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = val;
  loadEpisodes();
}

// ── Detail ────────────────────────────────────────────────
async function selectEp(id) {
  selectedId = id;
  loadEpisodes();
  const ep = await fetch(`/api/episodes/${id}`).then(r=>r.json()).catch(()=>null);
  if (!ep) return;
  switchSideTab(document.querySelector('.nav-tab'), 'detail');
  const p = document.getElementById('detailPanel');

  const scenes = ep.script_parsed?.scenes || [];
  const branches = ep.script_parsed?.next_branches || {};
  const isFailed = ep.status === 'FAILED';
  const isCompleted = ep.status === 'COMPLETED';
  const isPendingReview = ep.status === 'PENDING_REVIEW';

  p.innerHTML = `
    <div class="detail-header">
      <div class="detail-tag">${ep.episode_tag} · 重试${ep.retry_count}次</div>
      <div class="detail-title">${ep.title || '（未命名）'} <span class="badge badge-${ep.status.toLowerCase()}">${statusLabel(ep.status)}</span></div>
    </div>

    <div class="detail-actions">
      ${isPendingReview ? `<button class="btn btn-primary btn-sm" style="background:var(--yellow);color:#000" onclick="doApproveReview(${id})">✅ 批准剧本</button>` : ''}
      ${isFailed ? `<button class="btn btn-ghost btn-sm" onclick="doRetry(${id})">🔄 重试</button>` : ''}
      ${isCompleted ? `<button class="btn btn-primary btn-sm" onclick="doPublish(${id})">🚀 批准发布</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="openBranchModal(${id})">⚡ 强制分支</button>
      ${ep.douyin_video_url ? `<a href="${ep.douyin_video_url}" target="_blank" class="btn btn-ghost btn-sm">🔗 查看</a>` : ''}
    </div>

    ${isFailed ? `<div class="error-box">⚠ 失败于 <strong>${ep.error_stage||'?'}</strong><br>${ep.error_message||''}</div><br>` : ''}

    <div class="section">
      <div class="section-title">📊 投票数据</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">A 票</div><div class="info-value" style="color:var(--blue)">${ep.vote_a_count}</div></div>
        <div class="info-item"><div class="info-label">B 票</div><div class="info-value" style="color:var(--accent)">${ep.vote_b_count}</div></div>
        <div class="info-item"><div class="info-label">选择分支</div><div class="info-value">${ep.chosen_branch||'—'}</div></div>
        <div class="info-item"><div class="info-label">状态</div><div class="info-value">${statusLabel(ep.status)}</div></div>
      </div>
    </div>

    ${scenes.length ? `
    <div class="section">
      <div class="section-title">🎬 分镜剧本 (${scenes.length}个)</div>
      ${scenes.map(s=>`
        <div class="scene-card">
          <div class="scene-num">SCENE ${s.scene_index} · ${s.speaker||'旁白'} · ${s.emotion}</div>
          <div class="scene-dialogue">${s.dialogue}</div>
          <div class="scene-prompt">${s.visual_prompt}</div>
        </div>`).join('')}
    </div>` : ''}

    ${(branches.branch_a_teaser||branches.branch_b_teaser) ? `
    <div class="section">
      <div class="section-title">🔀 下集分支预告</div>
      <div class="branch-teaser branch-a"><div class="branch-label">选择 A</div><div class="branch-text">${branches.branch_a_teaser||''}</div></div>
      <div class="branch-teaser branch-b"><div class="branch-label">选择 B</div><div class="branch-text">${branches.branch_b_teaser||''}</div></div>
    </div>` : ''}

    ${ep.asset_manifest ? `
    <div class="section">
      <div class="section-title">📁 资产清单</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">图片</div><div class="info-value">${Object.keys(ep.asset_manifest.images||{}).length} 张</div></div>
        <div class="info-item"><div class="info-label">视频片段</div><div class="info-value">${Object.keys(ep.asset_manifest.clips||{}).length} 个</div></div>
        <div class="info-item"><div class="info-label">音频</div><div class="info-value">${Object.keys(ep.asset_manifest.audio||{}).length} 轨</div></div>
        <div class="info-item"><div class="info-label">成品视频</div><div class="info-value">${ep.has_video?'✅':'—'}</div></div>
      </div>
    </div>` : ''}
  `;
}

// ── Actions ───────────────────────────────────────────────
async function doRetry(id) {
  if (!confirm('确认重试此集？')) return;
  const r = await fetch(`/api/episodes/${id}/retry`, {method:'POST'}).then(r=>r.json());
  alert(r.message);
  loadEpisodes();
}

async function doPublish(id) {
  if (!confirm('确认批准发布此集至抖音？')) return;
  const r = await fetch(`/api/episodes/${id}/approve-publish`, {method:'POST'}).then(r=>r.json());
  alert(r.message);
  loadEpisodes();
}

async function doApproveReview(id) {
  if (!confirm('确认剧本内容无误，允许继续生成资产并扣除费用？')) return;
  const r = await fetch(`/api/episodes/${id}/approve-review`, {method:'POST'}).then(r=>r.json()).catch(e=>({message:e.toString()}));
  alert(r.message || r.detail);
  loadEpisodes();
}

let branchTargetId = null;
function openBranchModal(id) {
  branchTargetId = id;
  document.getElementById('runModal').classList.add('open');
}

async function triggerPipeline() {
  const branch = document.getElementById('branchSelect').value;
  const r = await fetch('/api/pipeline/run', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({branch_override: branch||null})
  }).then(r=>r.json()).catch(e=>({message:e.toString()}));
  closeRunModal();
  alert(r.message||r.detail);
  pollPipeline();
}

function openRunModal() { document.getElementById('runModal').classList.add('open'); }
function closeRunModal() { document.getElementById('runModal').classList.remove('open'); }
document.getElementById('runModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeRunModal(); });

// ── Logs WebSocket ─────────────────────────────────────────
function connectLogs() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/logs`);
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    appendLogs(data.lines);
  };
  ws.onclose = () => setTimeout(connectLogs, 3000);
}

function appendLogs(lines) {
  const box = document.getElementById('logBox');
  lines.forEach(l => {
    const d = document.createElement('div');
    d.style.cssText = 'padding:1px 0;white-space:pre-wrap;word-break:break-all';
    if (l.includes('SUCCESS') || l.includes('✓')) d.style.color = '#34d399';
    else if (l.includes('ERROR') || l.includes('FAILED') || l.includes('✗')) d.style.color = '#f87171';
    else if (l.includes('WARNING')) d.style.color = '#fbbf24';
    else if (l.includes('INFO')) d.style.color = '#60a5fa';
    else d.style.color = '#94a3b8';
    d.textContent = l;
    box.appendChild(d);
  });
  box.scrollTop = box.scrollHeight;
}

// ── Utils ──────────────────────────────────────────────────
function statusLabel(s) {
  return {VOTING:'投票中',GENERATING_SCRIPT:'生剧本',PENDING_REVIEW:'待审核',GENERATING_ASSETS:'生资产',GENERATING:'生成中',COMPLETED:'待发布',PUBLISHED:'已发布',FAILED:'失败'}[s] || s;
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return `${d}秒前`;
  if (d < 3600) return `${Math.floor(d/60)}分钟前`;
  if (d < 86400) return `${Math.floor(d/3600)}小时前`;
  return `${Math.floor(d/86400)}天前`;
}

function switchSideTab(btn, name) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>{ t.classList.remove('active'); t.style.display='none'; });
  if (btn) btn.classList.add('active');
  const el = document.getElementById('tab-'+name);
  if (el) { el.classList.add('active'); el.style.display='flex'; el.style.flexDirection='column'; }
}
</script>
